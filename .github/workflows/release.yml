name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm-deploy
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: https://registry.npmjs.org
                  cache: npm
            - run: npm install -g npm@^11.5.1
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check
            - run: npm run ai:check
            - run: npm run build
            - run: npm run test
            - run: npm --prefix website ci
            - run: npm run docs
            - run: npm run docs:site
            - run: npm publish --tag latest --access public --provenance
              env:
                  NODE_AUTH_TOKEN: ""
